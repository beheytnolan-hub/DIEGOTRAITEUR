<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>DIEGOTRAITEUR — Qualité & Tradition Culinaire</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
  
  <script src="https://www.paypal.com/sdk/js?client-id=METS_TON_CLIENT_ID_ICI&currency=EUR"></script>

  <style>
    :root {
      --accent: #d92b2b; /* Rouge signature */
      --accent-hover: #b31e1e;
      --accent-light: #fff0f0;
      --gold: #dfa846; /* Touche dorée festive */
      --bg: #0d0908; /* Fond sombre premium */
      --bg-card: #17100e;
      --bg-card-hover: #211714;
      --bg-nav: rgba(13, 9, 8, 0.8);
      --border: rgba(223, 168, 70, 0.15);
      --border-hover: rgba(223, 168, 70, 0.4);
      --text: #fdf6ec; 
      --text-muted: #a69995;
      --success: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; background: var(--bg); }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    h1, h2, h3, h4, .logo-text { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.5px; }

    /* BARRE DE NAVIGATION */
    nav { 
      position: fixed; top: 0; left: 0; right: 0; z-index: 100; 
      height: 85px; display: flex; align-items: center; justify-content: space-between; 
      padding: 0 5%; background: var(--bg-nav); border-bottom: 1px solid var(--border); 
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    .logo-container { display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
    .logo-img { height: 55px; width: 55px; object-fit: cover; border-radius: 50%; border: 2px solid var(--gold); background: white; }
    .logo-text { font-size: 1.5rem; font-weight: 700; color: var(--text); }
    .logo-text span { color: var(--accent); }
    
    .nav-links { display: flex; gap: 10px; align-items: center; }
    .nav-link-btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem; font-weight: 700; cursor: pointer; padding: 10px 20px; border-radius: 99px; transition: all 0.2s; }
    .nav-link-btn:hover { color: var(--text); border-color: var(--gold); }
    .nav-link-btn.active { color: white; background: var(--accent); border-color: var(--accent); }
    .cart-count { background: var(--gold); color: black; font-size: 0.75rem; width: 20px; height: 20px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; margin-left: 5px; }
    .nav-btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text); font-size: 0.95rem; font-weight: 600; cursor: pointer; padding: 10px 20px; border-radius: 100px; display: inline-flex; align-items: center; gap: 8px; }

    /* CONTROLES ET FILTRES */
    .controls-row { padding: 110px 5% 10px; max-width: 1400px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 15px; justify-content: space-between; align-items: center; }
    .search-wrapper { position: relative; flex-grow: 1; max-width: 400px; width: 100%; }
    .search-input { width: 100%; background: var(--bg-card); border: 1px solid var(--border); color: white; padding: 12px 20px; border-radius: 100px; outline: none; font-family: inherit; font-size: 0.9rem; transition: all 0.2s; }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(217, 43, 43, 0.15); }
    .sort-select { background: var(--bg-card); border: 1px solid var(--border); color: white; padding: 12px 20px; border-radius: 100px; outline: none; font-family: inherit; cursor: pointer; font-size: 0.9rem; }

    /* SECTIONS */
    .page-section { display: none; animation: fadeIn 0.4s ease forwards; }
    .page-section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* HERO BANNER */
    .hero { padding: 10px 5% 30px; max-width: 1400px; margin: 0 auto; }
    .hero-banner { background: linear-gradient(180deg, #1f1411 0%, #0d0908 100%); border: 1px solid var(--border); border-radius: 32px; padding: 70px 50px; position: relative; overflow: hidden; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .hero h1 { font-size: clamp(2.2rem, 5vw, 4.2rem); font-weight: 800; line-height: 1.1; margin-bottom: 15px; background: linear-gradient(180deg, #fff 40%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero p { color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin: 0 auto 30px; line-height: 1.6; }

    /* BOUTONS */
    .btn { padding: 14px 28px; border-radius: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 10px; text-decoration: none; font-size: 0.95rem; justify-content: center; border: none; font-family: inherit; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(217, 43, 43, 0.3); }
    .btn-secondary { background: var(--bg-card); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--gold); }
    .btn-danger { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
    .btn-danger:hover { background: #ef4444; color: white; }

    /* CATALOGUE */
    .shop-container { padding: 20px 5% 80px; max-width: 1400px; margin: 0 auto; }
    .grid-title { margin-bottom: 30px; font-size: 1.8rem; font-weight: 700; text-align: center; color: var(--gold); }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 30px; }
    
    .product-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 28px; overflow: hidden; transition: all 0.3s; display: flex; flex-direction: column; }
    .product-card:hover { transform: translateY(-6px); border-color: var(--gold); background: var(--bg-card-hover); }
    .prod-img-wrapper { width: 100%; aspect-ratio: 1.1; background: #130d0b; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; border-bottom: 1px solid var(--border); }
    .prod-img { width: 100%; height: 100%; object-fit: cover; }
    .prod-content { padding: 24px; display: flex; flex-direction: column; flex-grow: 1; }
    .prod-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; color: #fff; }
    .prod-desc { font-size: 0.88rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 20px; }
    .prod-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 15px; }
    .prod-price { font-size: 1.4rem; font-weight: 700; font-family: 'Space Grotesk', sans-serif; color: var(--gold); }

    /* CONTACT */
    .contact-container { max-width: 1000px; margin: 40px auto 80px; padding: 0 5%; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
    .contact-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 28px; padding: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
    .contact-card h2 { font-size: 2rem; color: var(--gold); margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
    .contact-info-line { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 22px; font-size: 1.05rem; line-height: 1.5; }
    .contact-info-line span.icon { font-size: 1.5rem; color: var(--accent); }
    .contact-info-line a { color: var(--text); text-decoration: none; font-weight: 600; }
    .contact-info-line a:hover { color: var(--gold); }

    /* PANIER */
    .sidebar { position: fixed; top: 0; right: -100%; width: 100%; max-width: 480px; height: 100vh; background: #0b0706; border-left: 1px solid var(--border); z-index: 200; box-shadow: -20px 0 50px rgba(0,0,0,0.8); transition: right 0.45s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; padding: 30px; }
    .sidebar.open { right: 0; }
    .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
    .sidebar-close { background: none; border: none; color: var(--text-muted); font-size: 1.8rem; cursor: pointer; padding: 5px; }
